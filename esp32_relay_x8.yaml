esphome:
  name: esp32-relay-x8
  comment: "ESP32 Relay X8 board configuration for 8 direct GPIO relays"

esp32:
  board: esp32dev
  framework:
    type: arduino


wifi:
  # ssid: "YOUR_WIFI_SSID"
  # password: "YOUR_WIFI_PASSWORD"

  # Optional manual IP if needed
  # manual_ip:
  #   static_ip: 192.168.1.100
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0
  ap:
    ssid: "PhiJo Smart Relay Fallback"
    password: !secret wifi_fallback_password
logger:

api:

ota:
  - platform: esphome
    id: my_ota
    password: !secret ota_password

captive_portal:

# Direct relay GPIO switches, HIGH active
switch:
  - platform: gpio
    id: relay1_switch
    internal: true
    name: "Relay 1"
    pin:
      number: GPIO32
      inverted: false
    restore_mode: RESTORE_LAST_STATE
  - platform: gpio
    id: relay2_switch
    internal: true
    name: "Relay 2"
    pin:
      number: GPIO33
      inverted: false
    restore_mode: RESTORE_LAST_STATE
  - platform: gpio
    id: relay3_switch
    internal: true
    name: "Relay 3"
    pin:
      number: GPIO25
      inverted: false
    restore_mode: RESTORE_LAST_STATE
  - platform: gpio
    id: relay4_switch
    internal: true
    name: "Relay 4"
    pin:
      number: GPIO26
      inverted: false
    restore_mode: RESTORE_LAST_STATE
  - platform: gpio
    id: relay5_switch
    internal: true
    name: "Relay 5"
    pin:
      number: GPIO27
      inverted: false
    restore_mode: RESTORE_LAST_STATE
  - platform: gpio
    id: relay6_switch
    internal: true
    name: "Relay 6"
    pin:
      number: GPIO14
      inverted: false
    restore_mode: RESTORE_LAST_STATE
  - platform: gpio
    id: relay7_switch
    internal: true
    name: "Relay 7"
    pin:
      number: GPIO12
      inverted: false
    restore_mode: RESTORE_LAST_STATE
  - platform: gpio
    id: relay8_switch
    internal: true
    name: "Relay 8"
    pin:
      number: GPIO13
      inverted: false
    restore_mode: RESTORE_LAST_STATE
  - platform: template
    name: "All Relays"
    optimistic: false
    lambda: |-
      return id(relay1_switch).state && id(relay2_switch).state && id(relay3_switch).state && id(relay4_switch).state && id(relay5_switch).state && id(relay6_switch).state && id(relay7_switch).state && id(relay8_switch).state;
    turn_on_action:
      - switch.turn_on: relay1_switch
      - switch.turn_on: relay2_switch
      - switch.turn_on: relay3_switch
      - switch.turn_on: relay4_switch
      - switch.turn_on: relay5_switch
      - switch.turn_on: relay6_switch
      - switch.turn_on: relay7_switch
      - switch.turn_on: relay8_switch
    turn_off_action:
      - switch.turn_off: relay1_switch
      - switch.turn_off: relay2_switch
      - switch.turn_off: relay3_switch
      - switch.turn_off: relay4_switch
      - switch.turn_off: relay5_switch
      - switch.turn_off: relay6_switch
      - switch.turn_off: relay7_switch
      - switch.turn_off: relay8_switch

binary_sensor:
  - platform: status
    name: "ESP32 Relay X8 Status"

web_server:
  port: 80
  version: 2
  include_internal: false
  local: true

 