esphome:
  name: relay16
  on_boot:
    - priority: 600.0
      then:
        - logger.log: "Starting 16 relay self-test (one by one)."
        - lambda: |-
            // set all relays off first
            id(relay1_state)=false; id(relay2_state)=false; id(relay3_state)=false; id(relay4_state)=false;
            id(relay5_state)=false; id(relay6_state)=false; id(relay7_state)=false; id(relay8_state)=false;
            id(relay9_state)=false; id(relay10_state)=false; id(relay11_state)=false; id(relay12_state)=false;
            id(relay13_state)=false; id(relay14_state)=false; id(relay15_state)=false; id(relay16_state)=false;
        - script.execute: write_shift_register
        - delay: 500ms
        - lambda: |-
            // set all relays on
            id(relay1_state)=true; id(relay2_state)=true; id(relay3_state)=true; id(relay4_state)=true;
            id(relay5_state)=true; id(relay6_state)=true; id(relay7_state)=true; id(relay8_state)=true;
            id(relay9_state)=true; id(relay10_state)=true; id(relay11_state)=true; id(relay12_state)=true;
            id(relay13_state)=true; id(relay14_state)=true; id(relay15_state)=true; id(relay16_state)=true;
        - script.execute: write_shift_register
        - delay: 500ms
        - lambda: |-
            // restore off state
            id(relay1_state)=false; id(relay2_state)=false; id(relay3_state)=false; id(relay4_state)=false;
            id(relay5_state)=false; id(relay6_state)=false; id(relay7_state)=false; id(relay8_state)=false;
            id(relay9_state)=false; id(relay10_state)=false; id(relay11_state)=false; id(relay12_state)=false;
            id(relay13_state)=false; id(relay14_state)=false; id(relay15_state)=false; id(relay16_state)=false;
        - script.execute: write_shift_register
        - logger.log: "Relay self-test complete."

esp8266:
  board: esp01_1m   # change to your board

wifi:
  ssid: "relay16"
  password: "password"

# Optional fallback captive portal (replaces old ap component)
captive_portal:

logger:

api:

ota:
  platform: esphome

# SPI-like bit-banged shift register pins (74HC595)
output:
  - platform: gpio
    id: sr_ser
    pin:
      number: GPIO14   # DS / SER
  - platform: gpio
    id: sr_rclk
    pin:
      number: GPIO12   # STCP / RCLK
  - platform: gpio
    id: sr_srclk
    pin:
      number: GPIO13   # SHCP / SRCLK
  - platform: gpio
    id: sr_oe
    pin:
      number: GPIO15   # OE (active low)
      inverted: true

globals:
  - id: relay1_state
    type: bool
    initial_value: 'false'
  - id: relay2_state
    type: bool
    initial_value: 'false'
  - id: relay3_state
    type: bool
    initial_value: 'false'
  - id: relay4_state
    type: bool
    initial_value: 'false'
  - id: relay5_state
    type: bool
    initial_value: 'false'
  - id: relay6_state
    type: bool
    initial_value: 'false'
  - id: relay7_state
    type: bool
    initial_value: 'false'
  - id: relay8_state
    type: bool
    initial_value: 'false'
  - id: relay9_state
    type: bool
    initial_value: 'false'
  - id: relay10_state
    type: bool
    initial_value: 'false'
  - id: relay11_state
    type: bool
    initial_value: 'false'
  - id: relay12_state
    type: bool
    initial_value: 'false'
  - id: relay13_state
    type: bool
    initial_value: 'false'
  - id: relay14_state
    type: bool
    initial_value: 'false'
  - id: relay15_state
    type: bool
    initial_value: 'false'
  - id: relay16_state
    type: bool
    initial_value: 'false'

script:
  - id: write_shift_register
    mode: queued
    then:
      - lambda: |-
          bool states[16] = {
            id(relay1_state), id(relay2_state), id(relay3_state), id(relay4_state),
            id(relay5_state), id(relay6_state), id(relay7_state), id(relay8_state),
            id(relay9_state), id(relay10_state), id(relay11_state), id(relay12_state),
            id(relay13_state), id(relay14_state), id(relay15_state), id(relay16_state)
          };
          auto *ser = id(sr_ser);
          auto *rclk = id(sr_rclk);
          auto *srclk = id(sr_srclk);

          // make sure outputs are enabled
          id(sr_oe).turn_on();

          rclk->turn_off();
          for (int i = 15; i >= 0; i--) {
            srclk->turn_off();
            if (states[i]) ser->turn_on(); else ser->turn_off();
            srclk->turn_on();
          }
          rclk->turn_on();

# Expose the 16 relays as switches in Home Assistant
switch:
  - platform: template
    name: "Relay 1"
    optimistic: true
    turn_on_action:
      - lambda: |-
          id(relay1_state) = true;
      - script.execute: write_shift_register
    turn_off_action:
      - lambda: |-
          id(relay1_state) = false;
      - script.execute: write_shift_register
