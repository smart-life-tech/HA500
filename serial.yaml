substitutions:
  name: "phijo-smart-device"
  friendly_name: "Phijo Smart"
  device_description: "Smart Controller"
  project_name: "Guition.ESP32_S3_4848S040"
  project_version: "09.07.26.1"
  wifi_ssid: ""
  wifi_password: ""

  log_main: "DEBUG"
  log_boot: "DEBUG"
  log_light_time: "DEBUG"
  log_irrigation: "DEBUG"
  log_automation: "DEBUG"
  log_pump: "DEBUG"
  log_weather: "DEBUG"
  log_ui: "DEBUG"
  log_touch: "DEBUG"
  log_switch_state: "DEBUG"

  # icon examples
  lightbulb: "\U000F0335"
  ceiling_light: "\U000F0769"
  floor_lamp: "\U000F08DD"
  settings_icon: "\U000F0493"
  home_icon: "\U000F02DC"
  sun_icon: "\U000F0599"
  moon_icon: "\U000F0F64"
  rain_icon: "\U000F0596"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  project:
    name: "${project_name}"
    version: "${project_version}"
  platformio_options:
    board_build.flash_mode: dio
    build_unflags:
      - "-f"
      - "-shared"
  on_boot:
    then:
      - lambda: |-
          ESP_LOGD("BOOT", "Device ${friendly_name} starting up...");
          ESP_LOGD("BOOT", "Project: %s v%s", "${project_name}", "${project_version}");
          ESP_LOGD("BOOT", "Position variable set to MIDDLE_LEFT");

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: DEBUG

# Main loop: continuously count up
interval:
  - interval: 1s
    then:
      - lambda: |-
          static int counter = 0;
          counter++;
          ESP_LOGD("COUNTER", "Count: %d", counter);


# Example dummy switch just to trigger logs
switch:
  - platform: template
    name: "Debug Switch"
    turn_on_action:
      - lambda: |-
          ESP_LOGD("DEBUG_SWITCH", "Switch turned ON at position MIDDLE_LEFT");
    turn_off_action:
      - lambda: |-
          ESP_LOGD("DEBUG_SWITCH", "Switch turned OFF at position MIDDLE_LEFT");

